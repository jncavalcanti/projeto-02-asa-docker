---
- name: Provisionamento da VM para o Projeto IFPB
  hosts: all
  become: true

  tasks:
    - name: Atualizar o cache do apt e fazer upgrade do sistema
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Instalar pacotes necessários para o Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Adicionar chave GPG oficial do Docker
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Adicionar repositório oficial do Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: Instalar Docker e Docker Compose Plugin (v5/Atual)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Garantir que o serviço do Docker está rodando
      service:
        name: docker
        state: started
        enabled: yes

    - name: Criar diretório para a aplicação
      file:
        path: /opt/wordpress-app
        state: directory
        mode: '0755'

    - name: Copiar o arquivo docker-compose.yml para a VM
      copy:
        src: docker-compose.yml
        dest: /opt/wordpress-app/docker-compose.yml
        mode: '0644'

    - name: Executar o Docker-compose para subir os containers
      command: docker compose up -d
      args:
        chdir: /opt/wordpress-app
