---
- name: Provisionamento Docker Wordpress
  hosts: all
  become: true

  tasks:
    - name: Atualizar cache do apt
      apt:
        update_cache: yes

    - name: Instalar dependencias previas do Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Criar diretorio para chaves do apt
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Adicionar chave GPG oficial do Docker
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Adicionar repositorio oficial do Docker (Debian Bookworm)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable"
        state: present
        filename: docker

    - name: Instalar Docker CE e Docker Compose Plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        update_cache: yes
        state: present

    - name: Habilitar Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Criar diretorio da aplicacao
      file:
        path: /opt/wordpress
        state: directory

    - name: Copiar docker-compose
      copy:
        src: docker-compose.yml
        dest: /opt/wordpress/docker-compose.yml

    - name: Executar Docker Compose
      command: docker compose up -d
      args:
        chdir: /opt/wordpress

    - name: Adicionar usuario vagrant ao grupo docker
      user:
        name: vagrant
        groups: docker
        append: yes
